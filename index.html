<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Dash - Obstacle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="score-board">Score: 0</div>
        <div id="glitch-warning">NORMAL STATUS</div>
        
        <div id="game-box">
            <div id="player"></div>
            <div id="obstacle"></div>
        </div>
        
        <div class="instructions">
            <p>Press <strong>SPACEBAR</strong> to Jump.</p>
            <p class="twist-alert">⚠️ WATCH OUT FOR RANDOM GLITCHES EVERY 8 SECONDS!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
